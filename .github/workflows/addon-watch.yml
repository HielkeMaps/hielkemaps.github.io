name: Addon update watcher

# Fetches the chunk.gg changelog pages of the add-ons that TreeCapitator advertises
# compatibility with, detects new "updated on" dates, asks Claude whether the update
# touches trees/axes, and posts the verdict to Discord. Last-seen state is committed back.
#
# Required repository secrets:
#   DISCORD_WEBHOOK_URL      - Discord channel webhook (notifications)
#   CLAUDE_CODE_OAUTH_TOKEN  - from `claude setup-token` (uses your Claude subscription)
# Without CLAUDE_CODE_OAUTH_TOKEN it still works, just without the AI tree/axe analysis.

on:
  schedule:
    - cron: "0 9 * * *" # daily 09:00 UTC
  workflow_dispatch:

concurrency:
  group: addon-watch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .github/addon-watch
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run addon update check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: node check.mjs

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update watched addon versions"
            git push
          else
            echo "No state changes to commit."
          fi
