name: Addon update watcher

# Checks the add-ons that TreeCapitator advertises compatibility with and posts a
# Discord notification when any of them ships a new version. The last-seen versions
# live in .github/addon-watch/state.json and are committed back after each run.
#
# Setup: add a repository secret named DISCORD_WEBHOOK_URL
#        (Settings -> Secrets and variables -> Actions -> New repository secret).

on:
  schedule:
    # Daily at 09:00 UTC.
    - cron: "0 9 * * *"
  workflow_dispatch:

# Avoid overlapping runs racing on the committed state file.
concurrency:
  group: addon-watch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run addon update check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node .github/addon-watch/check.mjs

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain .github/addon-watch/state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/addon-watch/state.json
            git commit -m "chore: update watched addon versions"
            git push
          else
            echo "No state changes to commit."
          fi
